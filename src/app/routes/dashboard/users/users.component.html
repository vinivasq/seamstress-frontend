<app-title
  [title]="'Usuários'"
  [icon]="'manage_accounts'"
  [descripton]="'Visualize e gerencie os usuários da plataforma.'"
></app-title>

<div class="users">
  <mat-card *ngFor="let user of users" class="user">
    <mat-card-header>
      <mat-card-title>{{ user.name }}</mat-card-title>
      <mat-card-subtitle>{{ user.userName }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="user__content">
      <div class="user__field">
        <p class="user__label">Função:</p>
        <p>{{ user.role }}</p>
      </div>
    </mat-card-content>
    <mat-card-actions class="card__buttons">
      <button mat-icon-button (click)="openEditDialog(user)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="openDeleteDialog(user)">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
